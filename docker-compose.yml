version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: rt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: resource_tracker
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: rt-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/resource_tracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: password
      CORS_ORIGINS: http://localhost:4200,http://localhost
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: rt-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
