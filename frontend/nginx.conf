server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Public DNS resolver so nginx can resolve the .onrender.com backend hostname
    resolver 8.8.8.8 1.1.1.1 valid=30s;

    # Proxy /api/* to the Spring Boot backend.
    # BACKEND_HOST is the bare hostname (no https://), injected by Render.
    location /api/ {
        set $backend "https://${BACKEND_HOST}";
        proxy_pass         $backend$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header   Host              ${BACKEND_HOST};
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Angular routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
