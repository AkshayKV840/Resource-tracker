<div class="modal-overlay" (click)="cancel()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h2>{{ isEdit ? 'Edit Resource' : 'Add Resource' }}</h2>

    <div class="form-grid">
      <div class="field">
        <label>Resource Name *</label>
        <input [(ngModel)]="form.name" placeholder="e.g. Akshay Khobragade" required />
      </div>
      <div class="field">
        <label>Role / Designation</label>
        <input [(ngModel)]="form.role" placeholder="e.g. Module Lead" />
      </div>
    </div>

    <div class="field">
      <label>Sprint / Project</label>
      <input [(ngModel)]="form.project" placeholder="e.g. Kanban" />
    </div>

    <div class="tasks-section">
      <div class="tasks-header">
        <label>Tasks</label>
        <button type="button" class="add-task-btn" (click)="addTask()">+ Add Task</button>
      </div>

      <div class="task-block" *ngFor="let t of form.tasks; let i = index">
        <div class="task-block-head">
          <span class="task-num">Task {{ i + 1 }}</span>
          <button type="button" class="remove-task-btn" (click)="removeTask(i)" *ngIf="form.tasks.length > 1" title="Remove">&#10005;</button>
        </div>
        <div class="field">
          <input [(ngModel)]="t.task" placeholder="e.g. TFR-2463- Pan and CUST changes" />
        </div>
        <div class="form-grid">
          <div class="field">
            <label>Story Status</label>
            <select [(ngModel)]="t.storyStatus">
              <option *ngFor="let s of storyStatuses" [value]="s">{{ s }}</option>
            </select>
          </div>
          <div class="field">
            <label>Estimated End Date</label>
            <input type="date" [(ngModel)]="t.endDate" (change)="onEndDateChange(t)" />
          </div>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn cancel-btn" (click)="cancel()">Cancel</button>
      <button class="btn save-btn" (click)="save()" [disabled]="saving || !form.name?.trim()">
        {{ saving ? 'Saving…' : 'Save' }}
      </button>
    </div>
  </div>
</div>
