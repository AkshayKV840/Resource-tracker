apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-tracker-frontend
  namespace: resource-tracker
  labels:
    app: resource-tracker-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resource-tracker-frontend
  template:
    metadata:
      labels:
        app: resource-tracker-frontend
    spec:
      containers:
        - name: frontend
          image: your-ecr-repo/resource-tracker-frontend:latest  # CHANGE THIS
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: resource-tracker-frontend
  namespace: resource-tracker
spec:
  selector:
    app: resource-tracker-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
