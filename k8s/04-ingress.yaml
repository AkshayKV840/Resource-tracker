apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resource-tracker-ingress
  namespace: resource-tracker
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    # Uncomment if you have cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # tls:                              # Uncomment for HTTPS
  #   - hosts:
  #       - tracker.your-company.com  # CHANGE THIS
  #     secretName: resource-tracker-tls
  rules:
    - host: tracker.your-company.com  # CHANGE THIS to your internal domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: resource-tracker-frontend
                port:
                  number: 80
