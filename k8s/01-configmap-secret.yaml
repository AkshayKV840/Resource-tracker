# ============================================================
#  ConfigMap — mounts application-prod.properties into the pod
#  Edit the values below before applying.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: resource-tracker-config
  namespace: resource-tracker
data:
  application-prod.properties: |
    spring.application.name=resource-tracker

    # Database
    spring.datasource.url=jdbc:mysql://YOUR_MYSQL_HOST:3306/resource_tracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    spring.datasource.username=YOUR_DB_USERNAME
    spring.datasource.password=YOUR_DB_PASSWORD
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

    # Connection pool
    spring.datasource.hikari.minimum-idle=5
    spring.datasource.hikari.maximum-pool-size=20
    spring.datasource.hikari.idle-timeout=300000
    spring.datasource.hikari.connection-timeout=20000

    # JPA
    spring.jpa.hibernate.ddl-auto=validate
    spring.jpa.show-sql=false
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

    # SQL init
    spring.sql.init.mode=always
    spring.sql.init.schema-locations=classpath:schema.sql
    spring.sql.init.data-locations=classpath:data.sql
    spring.sql.init.continue-on-error=true

    # Server
    server.port=8080

    # CORS
    app.cors.allowed-origins=http://tracker.your-company.internal

    # Logging
    logging.level.root=WARN
    logging.level.com.company.resourcetracker=INFO

---
# ============================================================
#  Secret — DB credentials (base64-encoded)
#  Generate:  echo -n 'yourvalue' | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: resource-tracker-db-secret
  namespace: resource-tracker
type: Opaque
data:
  DB_USERNAME: YOUR_BASE64_USERNAME
  DB_PASSWORD: YOUR_BASE64_PASSWORD
