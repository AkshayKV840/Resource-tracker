# ============================================================
#  Resource Tracker — Production Properties
#  Mount this file into the backend pod and set:
#  SPRING_CONFIG_LOCATION=classpath:/,file:/config/application-prod.properties
# ============================================================

spring.application.name=resource-tracker

# ---------------------------
# Database
# ---------------------------
spring.datasource.url=jdbc:mysql://YOUR_MYSQL_HOST:3306/resource_tracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ---------------------------
# JPA / Hibernate
# ---------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ---------------------------
# SQL Initialisation
# ---------------------------
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# ---------------------------
# Server
# ---------------------------
server.port=8080

# ---------------------------
# CORS  (comma-separate multiple origins)
# ---------------------------
app.cors.allowed-origins=http://tracker.your-company.internal

# ---------------------------
# Logging
# ---------------------------
logging.level.root=WARN
logging.level.com.company.resourcetracker=INFO
logging.level.org.springframework.web=WARN
