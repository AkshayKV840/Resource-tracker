spring.application.name=resource-tracker

# Database — PostgreSQL
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10

# JPA — let Hibernate create/update the table automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable SQL script init entirely — Hibernate handles the schema
spring.sql.init.mode=never

# Server
server.port=${PORT:8080}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}
