spring.application.name=resource-tracker

# DataSource is configured programmatically in DataSourceConfig.java
# (parses Render's DATABASE_URL into proper JDBC format)

# JPA — Hibernate creates/updates the table automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable SQL script init — Hibernate + DataInitializer handle schema and seed data
spring.sql.init.mode=never

# Server
server.port=${PORT:8080}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}
