# =============================================================
#  Render Blueprint — Resource Availability Tracker
# =============================================================

databases:
  - name: resource-tracker-db
    databaseName: resource_tracker
    user: rt_user
    plan: free
    region: singapore

services:

  # -----------------------------------------------------------
  #  Backend — Spring Boot
  # -----------------------------------------------------------
  - type: web
    name: resource-tracker-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /api/resources/stats
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: resource-tracker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: resource-tracker-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: resource-tracker-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: resource-tracker-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: resource-tracker-db
          property: password
      - key: PORT
        value: "8080"
      - key: CORS_ORIGINS
        value: "https://resource-tracker-frontend.onrender.com"

  # -----------------------------------------------------------
  #  Frontend — Angular served via Nginx
  # -----------------------------------------------------------
  - type: web
    name: resource-tracker-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: BACKEND_URL
        value: "https://resource-tracker-backend.onrender.com"
